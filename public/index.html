<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德州扑克 - 大厅</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="lobby-page">
  <div class="lobby-container">
    <h1>♠ 德州扑克 ♥</h1>
    <div class="card-box">
      <input type="text" id="playerName" placeholder="输入你的昵称" maxlength="12">

      <div class="section">
        <h3>创建房间</h3>
        <div class="options-row">
          <label>初始筹码 <input type="number" id="startingChips" value="1000" min="100" step="100"></label>
          <label>小盲 <input type="number" id="smallBlind" value="10" min="1"></label>
          <label>大盲 <input type="number" id="bigBlind" value="20" min="2"></label>
        </div>
        <button id="createBtn" class="btn-primary">创建房间</button>
      </div>

      <div class="divider">或</div>

      <div class="section">
        <h3>加入房间</h3>
        <input type="text" id="roomIdInput" placeholder="输入房间号" maxlength="6" style="text-transform:uppercase">
        <button id="joinBtn" class="btn-secondary">加入房间</button>
      </div>

      <div id="errorMsg" class="error-msg"></div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/lobby.js"></script>
</body>
</html>
