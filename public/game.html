<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德州扑克</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-page">
  <div id="lobby-screen" class="screen">
    <div class="room-info">
      <span>房间号: <strong id="roomIdDisplay"></strong></span>
      <button id="copyRoomBtn" class="btn-small">复制</button>
    </div>
    <div id="playerList" class="player-list"></div>
    <button id="startBtn" class="btn-primary" style="display:none">开始游戏</button>
    <p id="waitMsg" class="wait-msg">等待房主开始游戏...</p>
  </div>

  <div id="game-screen" class="screen" style="display:none">
    <div class="game-main">
      <div class="table-wrap">
        <div class="poker-table">
          <div id="seats"></div>
          <div class="table-center">
            <div id="communityCards" class="community-cards"></div>
            <div class="pot-display">底池: <span id="potAmount">0</span></div>
            <div id="phaseLabel" class="phase-label"></div>
            <div id="gameTimer" class="game-timer" style="display:none"></div>
          </div>
        </div>
      </div>

      <div class="bottom-panel">
        <div class="my-cards" id="myCards"></div>
        <div class="action-panel" id="actionPanel" style="display:none">
          <div id="thinkTimer" class="think-timer"></div>
          <button id="foldBtn" class="btn-action btn-fold">弃牌</button>
          <button id="checkBtn" class="btn-action btn-check">过牌</button>
          <button id="callBtn" class="btn-action btn-call">跟注</button>
          <div class="raise-wrap">
            <button id="raiseBtn" class="btn-action btn-raise">加注</button>
            <input type="range" id="raiseSlider" min="0" max="1000" step="10" value="0">
            <span id="raiseAmount">0</span>
          </div>
          <button id="allinBtn" class="btn-action btn-allin">All-in</button>
        </div>
        <button id="rebuyBtn" class="btn-action btn-rebuy" style="display:none">带入筹码</button>
      </div>

      <div class="log-panel">
        <div id="actionLog"></div>
      </div>
    </div>

    <!-- 右侧汇总面板 -->
    <div class="stats-panel">
      <div class="stats-title">战绩汇总</div>
      <div id="statsTable"></div>
    </div>

    <div id="resultOverlay" class="result-overlay" style="display:none">
      <div class="result-box">
        <h2 id="resultTitle"></h2>
        <div id="resultDetail"></div>
        <div class="wait-msg">3秒后自动开始下一局...</div>
      </div>
    </div>

    <!-- 带入筹码弹窗 -->
    <div id="rebuyOverlay" class="result-overlay" style="display:none">
      <div class="result-box">
        <h2>带入筹码</h2>
        <p style="color:#aaa;margin:8px 0">当前筹码: <span id="myChipsDisplay">0</span></p>
        <input type="number" id="rebuyAmount" value="1000" min="100" step="100"
          style="width:100%;padding:10px;border-radius:8px;border:1px solid #334;background:#0f3460;color:#eee;font-size:1rem;margin:12px 0">
        <div style="display:flex;gap:10px">
          <button id="rebuyConfirmBtn" class="btn-primary">确认带入</button>
          <button id="rebuyCancelBtn" class="btn-secondary">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
